<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizPilot | Command Center Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: var(--spacing-stack-lg);
            min-height: 80vh;
        }
        
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-stack-md);
        }
        
        .sidebar-item {
            padding: 12px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--color-on-surface-variant);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--color-on-surface);
        }
        
        .sidebar-item.active {
            border-left: 2px solid var(--color-primary-container);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-stack-lg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-stack-md);
        }

        .stat-card {
            padding: var(--spacing-stack-md);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 300;
            color: var(--color-on-surface);
        }

        .stat-label {
            font-size: 14px;
            color: var(--color-on-surface-variant);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .chart-placeholder {
            height: 300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-default);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: var(--color-on-surface-variant);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Navigation -->
        <nav>
            <div class="logo-container">
                <img src="assets/command_center.png" alt="BizPilot Command Center" style="height: 40px; border-radius: var(--radius-sm);">
                <span class="label-md" style="font-size: 18px; color: var(--color-on-surface); letter-spacing: 0;">Command Center</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="chat.html">Live Chat Sandbox</a>
            </div>
        </nav>

        <div class="dashboard-grid">
            <!-- Sidebar -->
            <aside class="sidebar">
                <a href="#" class="sidebar-item active">
                    <span class="material-symbols-outlined">dashboard</span>
                    Overview
                </a>
                <a href="#" class="sidebar-item">
                    <span class="material-symbols-outlined">analytics</span>
                    Analytics
                </a>
                <a href="#" class="sidebar-item">
                    <span class="material-symbols-outlined">group</span>
                    Agent Performance
                </a>
                <a href="#" class="sidebar-item">
                    <span class="material-symbols-outlined">settings</span>
                    Settings
                </a>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 class="headline-md">Live Agent Analytics</h2>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="status-dot"></span>
                        <span class="mono-label" style="color: var(--color-primary-container);">LIVE</span>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="glass-panel stat-card">
                        <span class="stat-label">Active Conversations</span>
                        <span class="stat-value" id="stat-total">0</span>
                    </div>
                    <div class="glass-panel stat-card" style="border-left: 2px solid var(--agent-sales);">
                        <span class="stat-label">Sales Routing</span>
                        <span class="stat-value" id="stat-sales">0</span>
                    </div>
                    <div class="glass-panel stat-card" style="border-left: 2px solid var(--agent-support);">
                        <span class="stat-label">Support Tickets</span>
                        <span class="stat-value" id="stat-support">0</span>
                    </div>
                    <div class="glass-panel stat-card" style="border-left: 2px solid var(--agent-care);">
                        <span class="stat-label">Escalations Handled</span>
                        <span class="stat-value" id="stat-care">0</span>
                    </div>
                </div>

                <div class="glass-panel">
                    <h3 class="headline-sm" style="margin-bottom: 16px;">Real-Time Routing Graph</h3>
                    <div class="chart-placeholder" style="background: transparent; border: none;">
                        <canvas id="routingChart"></canvas>
                    </div>
                </div>
            </main>
        </div>
        
        <footer class="footer">
            <p>&copy; 2026 BizPilot. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const ctx = document.getElementById('routingChart').getContext('2d');
        const routingChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Sales Agent', 'Support Agent', 'Care Agent'],
                datasets: [{
                    label: '# of Conversations',
                    data: [0, 0, 0],
                    backgroundColor: [
                        '#d97757', // Sales
                        '#a8d5e2', // Support
                        '#e2c2a4'  // Care
                    ],
                    borderColor: '#1e1f26',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            color: '#e2e2eb',
                            font: {
                                family: 'Outfit',
                                size: 14
                            }
                        }
                    }
                }
            }
        });

        function fetchAnalytics() {
            fetch('http://localhost:8001/api/analytics')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('stat-total').textContent = data.total;
                    document.getElementById('stat-sales').textContent = data.sales;
                    document.getElementById('stat-support').textContent = data.support;
                    document.getElementById('stat-care').textContent = data.care;
                    
                    routingChart.data.datasets[0].data = [data.sales, data.support, data.care];
                    routingChart.update();
                })
                .catch(err => console.error("Error fetching analytics", err));
        }

        // Fetch immediately and then poll every 3 seconds
        fetchAnalytics();
        setInterval(fetchAnalytics, 3000);
    </script>
</body>
</html>
