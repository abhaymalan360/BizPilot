<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizPilot | System Initialization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .wizard-container {
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        
        .form-label {
            display: block;
            color: var(--color-on-surface-variant);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 16px;
            border-radius: var(--radius-default);
            font-family: var(--font-family-primary);
            font-size: 16px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--color-primary-container);
        }
        
        .pulse-dot {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Navigation -->
        <nav>
            <div class="logo-container">
                <img src="assets/setup_wizard.png" alt="Setup Wizard" style="height: 40px; border-radius: var(--radius-sm);">
                <span class="label-md" style="font-size: 18px; color: var(--color-on-surface); letter-spacing: 0;">Setup Wizard</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
            </div>
        </nav>

        <div class="wizard-container">
            <div style="display: inline-flex; items-center; gap: 8px; padding: 4px 12px; margin-bottom: 24px; border-radius: var(--radius-full); background: var(--color-surface-container); border: 1px solid var(--color-outline-variant);">
                <span class="status-dot pulse-dot" style="margin-top: 6px;"></span>
                <span class="mono-label text-gradient">SYSTEM INITIALIZATION</span>
            </div>
            
            <h1 class="display-lg" style="margin-bottom: 16px;">Configure Your Agents</h1>
            <p class="body-lg" style="color: var(--color-on-surface-variant); margin-bottom: 40px;">
                Define your business profile below to instantly context-load your Sales, Support, and Care agents.
            </p>
            
            <div class="glass-panel" style="padding: 32px;">
                <form id="setup-form">
                    <div class="form-group">
                        <label class="form-label">Business Name</label>
                        <input type="text" id="business_name" class="form-input" placeholder="e.g. TrendyThreads" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Industry</label>
                        <input type="text" id="industry" class="form-input" placeholder="e.g. E-Commerce Clothing" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Agent Tone</label>
                        <select id="tone" class="form-input" required>
                            <option value="Professional and Concise">Professional & Concise</option>
                            <option value="Friendly and Enthusiastic">Friendly & Enthusiastic</option>
                            <option value="Authoritative and Technical">Authoritative & Technical</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Deploy Agents</button>
                </form>
                
                <div id="success-msg" style="display: none; margin-top: 24px; color: var(--agent-support); font-weight: 500;">
                    Agents deployed successfully! Redirecting to Command Center...
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('setup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                business_name: document.getElementById('business_name').value,
                industry: document.getElementById('industry').value,
                tone: document.getElementById('tone').value
            };
            
            fetch('http://localhost:8001/api/initialize', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(resData => {
                document.getElementById('setup-form').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            })
            .catch(err => {
                console.error("Error initializing system", err);
                alert("Failed to initialize. Is backend running?");
            });
        });
    </script>
</body>
</html>
